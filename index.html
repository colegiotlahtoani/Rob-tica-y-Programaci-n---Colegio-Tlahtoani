<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Unidad 1 - Tecnología | Colegio Tlahtoani</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
margin:0;
background:linear-gradient(135deg,#4facfe,#00f2fe);
}

header{
text-align:center;
color:white;
padding:40px;
}

header h1{
font-size:40px;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
padding:25px;
}

.card{
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.examples{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:20px;
margin-top:20px;
}

.example{
background:#eef4ff;
padding:20px;
border-radius:12px;
font-size:20px;
text-align:center;
}

.activity{
background:#fff7d6;
padding:25px;
border-radius:15px;
margin-top:25px;
}

canvas{
border:3px solid #ccc;
border-radius:10px;
background:white;
width:100%;
max-width:800px;
height:400px;
touch-action:none;
cursor:crosshair;
}

.tools{
margin-top:10px;
}

button{
background:#4CAF50;
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
margin:5px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#43a047;
}

</style>

</head>

<body>

<header>

<h1>Unidad 1</h1>
<p>¿Qué es la tecnología?</p>

</header>

<div class="container">

<div class="card">

<h2>📚 Explicación</h2>

<p>
La tecnología son herramientas que usamos para resolver problemas o hacer nuestra vida más fácil.
</p>

<h3>Ejemplos:</h3>

<div class="examples">

<div class="example">📱 Celular</div>
<div class="example">💻 Computadora</div>
<div class="example">🤖 Robot</div>
<div class="example">🚦 Semáforo</div>

</div>

<div class="activity">

<h2>🎨 Actividad</h2>

<p>Dibuja 3 tecnologías que uses todos los días.</p>

<canvas id="canvas"></canvas>

<div class="tools">

<button onclick="clearCanvas()">🧹 Borrar</button>
<button onclick="saveDrawing()">💾 Guardar</button>

</div>

<p id="message"></p>

</div>

</div>

</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let drawing=false;

function resizeCanvas(){

const rect=canvas.getBoundingClientRect();

canvas.width=rect.width;
canvas.height=rect.height;

}

resizeCanvas();
window.addEventListener("resize",resizeCanvas);

canvas.addEventListener("pointerdown",(e)=>{

drawing=true;
draw(e);

});

canvas.addEventListener("pointermove",(e)=>{

if(!drawing)return;
draw(e);

});

canvas.addEventListener("pointerup",()=>{

drawing=false;
ctx.beginPath();

});

canvas.addEventListener("pointerleave",()=>{

drawing=false;
ctx.beginPath();

});

function draw(e){

const rect=canvas.getBoundingClientRect();

const x=e.clientX-rect.left;
const y=e.clientY-rect.top;

ctx.lineWidth=5;
ctx.lineCap="round";
ctx.strokeStyle="#000";

ctx.lineTo(x,y);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(x,y);

}

function clearCanvas(){

ctx.clearRect(0,0,canvas.width,canvas.height);

}

function saveDrawing(){

let link=document.createElement("a");

link.download="mi_dibujo_tecnologia.png";
link.href=canvas.toDataURL();

link.click();

document.getElementById("message").innerHTML="✅ ¡Dibujo guardado!";

}

</script>

</body>
</html>
