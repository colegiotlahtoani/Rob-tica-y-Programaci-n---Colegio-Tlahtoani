<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manual Digital - Unidad 1</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#e9f2ff;
font-family:Poppins;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CONTENEDOR DEL LIBRO */

.book{

width:95vw;
max-width:1100px;
height:85vh;

background:white;

border-radius:20px;

box-shadow:0 20px 40px rgba(0,0,0,.2);

display:flex;
flex-direction:column;

}

/* HEADER */

.header{

padding:20px;
background:#4facfe;
color:white;
text-align:center;

}

/* CONTENIDO */

.content{

flex:1;
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
padding:25px;

overflow:auto;

}

/* TARJETAS */

.card{

background:#f7faff;
padding:20px;
border-radius:15px;

}

/* EJEMPLOS */

.examples{

display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;

}

.example{

background:white;
padding:15px;
border-radius:10px;
text-align:center;
font-size:20px;

}

/* ACTIVIDAD */

canvas{

width:100%;
height:250px;
background:white;
border:2px solid #ccc;
border-radius:10px;
touch-action:none;

}

/* BOTONES */

.buttons{

margin-top:10px;
display:flex;
gap:10px;

}

button{

flex:1;
padding:10px;
border:none;
border-radius:10px;
background:#4CAF50;
color:white;
font-size:16px;
cursor:pointer;

}

/* NAVEGACIÓN */

.nav{

display:flex;
justify-content:space-between;
padding:15px;

background:#f0f0f0;

}

/* CELULAR */

@media(max-width:800px){

.content{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="book">

<div class="header">

<h1>Unidad 1</h1>
<p>¿Qué es la tecnología?</p>

</div>

<div class="content">

<div class="card">

<h2>Explicación</h2>

<p>
La tecnología son herramientas que usamos para resolver problemas o hacer nuestra vida más fácil.
</p>

<h3>Ejemplos</h3>

<div class="examples">

<div class="example">📱 Celular</div>
<div class="example">💻 Computadora</div>
<div class="example">🤖 Robot</div>
<div class="example">🚦 Semáforo</div>

</div>

</div>

<div class="card">

<h2>Actividad</h2>

<p>Dibuja 3 tecnologías que usas todos los días.</p>

<canvas id="canvas"></canvas>

<div class="buttons">

<button onclick="clearCanvas()">Borrar</button>
<button onclick="saveDrawing()">Guardar</button>

</div>

</div>

</div>

<div class="nav">

<button>⬅ Unidad anterior</button>
<button>Siguiente unidad ➡</button>

</div>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let drawing=false

function resizeCanvas(){

const rect=canvas.getBoundingClientRect()

canvas.width=rect.width
canvas.height=rect.height

}

resizeCanvas()
window.addEventListener("resize",resizeCanvas)

canvas.addEventListener("pointerdown",e=>{
drawing=true
draw(e)
})

canvas.addEventListener("pointermove",e=>{
if(!drawing)return
draw(e)
})

canvas.addEventListener("pointerup",()=>{
drawing=false
ctx.beginPath()
})

function draw(e){

const rect=canvas.getBoundingClientRect()

const x=e.clientX-rect.left
const y=e.clientY-rect.top

ctx.lineWidth=5
ctx.lineCap="round"

ctx.lineTo(x,y)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(x,y)

}

function clearCanvas(){

ctx.clearRect(0,0,canvas.width,canvas.height)

}

function saveDrawing(){

let link=document.createElement("a")

link.download="dibujo.png"
link.href=canvas.toDataURL()

link.click()

}

</script>

</body>
</html>
