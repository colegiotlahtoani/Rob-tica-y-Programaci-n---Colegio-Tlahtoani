<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unidad 1 | Tecnología</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#4facfe,#00f2fe);
}

header{
text-align:center;
color:white;
padding:25px;
}

header h1{
margin:0;
font-size:34px;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.book{

background:white;
border-radius:20px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,.2);

display:grid;
grid-template-columns:1fr 1fr;
gap:30px;

}

.section h2{
margin-top:0;
}

.examples{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-top:20px;

}

.example{

background:#eef4ff;
padding:20px;
border-radius:12px;
font-size:20px;
text-align:center;

}

.activity{

background:#fff7d6;
padding:20px;
border-radius:15px;

}

canvas{

width:100%;
height:300px;
background:white;
border:3px solid #ccc;
border-radius:10px;
touch-action:none;

}

.tools{

margin-top:10px;
display:flex;
gap:10px;
flex-wrap:wrap;

}

button{

flex:1;
padding:12px;
font-size:16px;
border:none;
border-radius:10px;
background:#4CAF50;
color:white;
cursor:pointer;

}

button:hover{

background:#43a047;

}

.message{

margin-top:10px;

}

/* Ajuste para celulares */

@media(max-width:800px){

.book{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<header>

<h1>Unidad 1</h1>
<p>¿Qué es la tecnología?</p>

</header>

<div class="container">

<div class="book">

<div class="section">

<h2>📚 Explicación</h2>

<p>
La tecnología son herramientas que usamos para resolver problemas o hacer nuestra vida más fácil.
</p>

<h3>Ejemplos</h3>

<div class="examples">

<div class="example">📱 Celular</div>
<div class="example">💻 Computadora</div>
<div class="example">🤖 Robot</div>
<div class="example">🚦 Semáforo</div>

</div>

</div>

<div class="section activity">

<h2>🎨 Actividad</h2>

<p>Dibuja 3 tecnologías que uses todos los días.</p>

<canvas id="canvas"></canvas>

<div class="tools">

<button onclick="clearCanvas()">🧹 Borrar</button>
<button onclick="saveDrawing()">💾 Guardar</button>

</div>

<p class="message" id="message"></p>

</div>

</div>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let drawing=false

function resizeCanvas(){

const rect=canvas.getBoundingClientRect()

canvas.width=rect.width
canvas.height=rect.height

}

resizeCanvas()
window.addEventListener("resize",resizeCanvas)

canvas.addEventListener("pointerdown",e=>{
drawing=true
draw(e)
})

canvas.addEventListener("pointermove",e=>{
if(!drawing)return
draw(e)
})

canvas.addEventListener("pointerup",()=>{
drawing=false
ctx.beginPath()
})

canvas.addEventListener("pointerleave",()=>{
drawing=false
ctx.beginPath()
})

function draw(e){

const rect=canvas.getBoundingClientRect()

const x=e.clientX-rect.left
const y=e.clientY-rect.top

ctx.lineWidth=5
ctx.lineCap="round"
ctx.strokeStyle="#000"

ctx.lineTo(x,y)
ctx.stroke()
ctx.beginPath()
ctx.moveTo(x,y)

}

function clearCanvas(){

ctx.clearRect(0,0,canvas.width,canvas.height)

}

function saveDrawing(){

let link=document.createElement("a")

link.download="tecnologia.png"
link.href=canvas.toDataURL()

link.click()

message.innerHTML="✅ ¡Dibujo guardado!"

}

</script>

</body>
</html>
