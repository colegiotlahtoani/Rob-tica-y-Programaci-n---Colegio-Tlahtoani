<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Robótica Interactiva | Colegio Tlahtoani</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
margin:0;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:#333;
}

header{
text-align:center;
padding:40px;
color:white;
}

.container{
max-width:1100px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:30px;
border-radius:20px;
margin-bottom:30px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h2{
margin-top:0;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#4CAF50;
color:white;
cursor:pointer;
margin:5px;
}

button:hover{
background:#3e8e41;
}

.grid{
display:grid;
grid-template-columns:repeat(5,60px);
gap:5px;
margin-top:20px;
}

.cell{
width:60px;
height:60px;
background:#e0e0e0;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
border-radius:8px;
}

.robot{
background:#a5d6ff;
}

.goal{
background:#ffe082;
}

.program{
background:#f5f5f5;
padding:15px;
border-radius:10px;
margin-top:15px;
min-height:50px;
}

.block{
display:inline-block;
padding:10px;
margin:5px;
background:#90caf9;
border-radius:8px;
cursor:pointer;
}

.progressbar{
height:20px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin-bottom:20px;
}

.progress{
height:100%;
width:0%;
background:#4CAF50;
}

</style>
</head>

<body>

<header>

<h1>🤖 Robótica Interactiva</h1>
<p>Colegio Tlahtoani</p>

</header>

<div class="container">

<div class="progressbar">
<div class="progress" id="progress"></div>
</div>

<!-- UNIDAD ROBOT -->

<div class="card">

<h2>Reto: Programa al Robot</h2>

<p>Haz que el robot llegue a la estrella.</p>

<div class="grid" id="grid"></div>

<div>

<div class="block" onclick="addCommand('up')">⬆️ Avanzar</div>
<div class="block" onclick="addCommand('right')">➡️ Derecha</div>
<div class="block" onclick="addCommand('left')">⬅️ Izquierda</div>

</div>

<div class="program" id="program"></div>

<button onclick="runProgram()">Ejecutar programa</button>

<p id="result"></p>

</div>

<!-- UNIDAD LOGICA -->

<div class="card">

<h2>Actividad de Lógica</h2>

<p>Ordena los pasos para hacer un sándwich.</p>

<select id="p1">
<option>Elegir</option>
<option>Abrir pan</option>
<option>Poner jamón</option>
<option>Poner queso</option>
<option>Cerrar pan</option>
</select>

<select id="p2">
<option>Elegir</option>
<option>Abrir pan</option>
<option>Poner jamón</option>
<option>Poner queso</option>
<option>Cerrar pan</option>
</select>

<select id="p3">
<option>Elegir</option>
<option>Abrir pan</option>
<option>Poner jamón</option>
<option>Poner queso</option>
<option>Cerrar pan</option>
</select>

<select id="p4">
<option>Elegir</option>
<option>Abrir pan</option>
<option>Poner jamón</option>
<option>Poner queso</option>
<option>Cerrar pan</option>
</select>

<br><br>

<button onclick="checkLogic()">Revisar</button>

<p id="logicResult"></p>

</div>

</div>

<script>

let robot={x:0,y:0}
let goal={x:4,y:2}
let commands=[]

function drawGrid(){

let grid=document.getElementById("grid")
grid.innerHTML=""

for(let y=0;y<3;y++){

for(let x=0;x<5;x++){

let cell=document.createElement("div")
cell.className="cell"

if(robot.x==x && robot.y==y){

cell.innerHTML="🤖"
cell.classList.add("robot")

}

else if(goal.x==x && goal.y==y){

cell.innerHTML="⭐"
cell.classList.add("goal")

}

grid.appendChild(cell)

}

}

}

drawGrid()

function addCommand(cmd){

commands.push(cmd)

let program=document.getElementById("program")

program.innerHTML+=cmd+" "

}

function runProgram(){

robot={x:0,y:0}

for(let c of commands){

if(c=="up")robot.y--

if(c=="right")robot.x++

if(c=="left")robot.x--

}

drawGrid()

if(robot.x==goal.x && robot.y==goal.y){

document.getElementById("result").innerHTML="🎉 ¡Lo lograste!"
updateProgress()

}else{

document.getElementById("result").innerHTML="Intenta otra vez"

}

commands=[]
document.getElementById("program").innerHTML=""

}

function checkLogic(){

let correct=["Abrir pan","Poner jamón","Poner queso","Cerrar pan"]

let answers=[

p1.value,
p2.value,
p3.value,
p4.value

]

let ok=true

for(let i=0;i<4;i++){

if(correct[i]!=answers[i])ok=false

}

if(ok){

logicResult.innerHTML="🎉 Correcto!"
updateProgress()

}else{

logicResult.innerHTML="Intenta otra vez"

}

}

let progress=0

function updateProgress(){

progress+=50

if(progress>100)progress=100

document.getElementById("progress").style.width=progress+"%"

}

</script>

</body>
</html>
