<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manual Digital | Unidad 1</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
width:100vw;
overflow:hidden;
}

.book{
width:95vw;
height:92vh;
max-width:1400px;
background:white;
border-radius:20px;
box-shadow:0 25px 50px rgba(0,0,0,.2);
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
background:#4facfe;
color:white;
padding:clamp(15px,2vw,30px);
text-align:center;
}

.header h1{
margin:0;
font-size:clamp(28px,4vw,40px);
}

.header p{
margin-top:5px;
font-size:clamp(16px,2vw,20px);
}

.content{
flex:1;
display:grid;
grid-template-columns:1fr 1fr;
gap:clamp(15px,2vw,30px);
padding:clamp(20px,3vw,40px);
overflow:auto;
}

.card{
background:#f6f9ff;
border-radius:15px;
padding:clamp(20px,2vw,30px);
display:flex;
flex-direction:column;
}

h2{
margin-top:0;
font-size:clamp(22px,2.5vw,28px);
}

p{
font-size:clamp(16px,1.5vw,18px);
}

.examples{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:clamp(10px,1vw,15px);
margin-top:10px;
}

.example{
background:white;
padding:clamp(12px,1.5vw,18px);
border-radius:10px;
text-align:center;
font-size:clamp(20px,2vw,24px);
box-shadow:0 3px 8px rgba(0,0,0,.1);
}

canvas{
width:100%;
height:clamp(220px,35vh,350px);
background:white;
border:2px solid #ccc;
border-radius:10px;
touch-action:none;
}

.buttons{
margin-top:15px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
flex:1;
padding:clamp(10px,1.5vw,14px);
font-size:clamp(14px,1.5vw,18px);
border:none;
border-radius:10px;
background:#4CAF50;
color:white;
cursor:pointer;
transition:.2s;
}

button.active{
background:#ff9800;
}

button:hover{
transform:scale(1.05);
}

.nav{
display:flex;
justify-content:space-between;
padding:clamp(12px,1.5vw,18px);
background:#f1f1f1;
}

.nav button{
background:#4facfe;
}

@media(max-width:900px){

.content{
grid-template-columns:1fr;
}

body{
overflow:auto;
height:auto;
}

.book{
height:auto;
}

}

</style>

</head>

<body>

<div class="book">

<div class="header">

<h1>Unidad 1</h1>
<p>¿Qué es la tecnología?</p>

</div>

<div class="content">

<div class="card">

<h2>📚 Explicación</h2>

<p>
La tecnología son herramientas que usamos para resolver problemas o hacer nuestra vida más fácil.
</p>

<h2>Ejemplos</h2>

<div class="examples">

<div class="example">📱 Celular</div>
<div class="example">💻 Computadora</div>
<div class="example">🤖 Robot</div>
<div class="example">🚦 Semáforo</div>

</div>

</div>

<div class="card">

<h2>🎨 Actividad</h2>

<p>Dibuja 3 tecnologías que usas todos los días.</p>

<canvas id="canvas"></canvas>

<div class="buttons">

<button id="penBtn" onclick="setTool('pen')">✏️ Lápiz</button>

<button id="eraserBtn" onclick="setTool('eraser')">🧽 Borrador</button>

<button onclick="saveDrawing()">💾 Guardar</button>

<button onclick="enableEdit()">✏️ Editar</button>

</div>

<p id="message"></p>

</div>

</div>

<div class="nav">

<button>⬅ Unidad anterior</button>

<button>Siguiente unidad ➡</button>

</div>

</div>

<script>

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

let drawing = false
let tool = null
let locked = false

const penBtn = document.getElementById("penBtn")
const eraserBtn = document.getElementById("eraserBtn")

function resizeCanvas(){

const rect = canvas.getBoundingClientRect()

const saved = localStorage.getItem("unidad1_dibujo")

canvas.width = rect.width
canvas.height = rect.height

if(saved){

const img = new Image()

img.src = saved

img.onload = () => {

ctx.drawImage(img,0,0,canvas.width,canvas.height)

locked = true

}

}

}

resizeCanvas()

window.addEventListener("resize",resizeCanvas)

canvas.addEventListener("pointerdown", e => {

if(locked || tool === null) return

drawing = true

draw(e)

})

canvas.addEventListener("pointermove", e => {

if(!drawing || locked || tool === null) return

draw(e)

})

canvas.addEventListener("pointerup", () => {

drawing = false

ctx.beginPath()

})

canvas.addEventListener("pointerleave", () => {

drawing = false

ctx.beginPath()

})

function draw(e){

const rect = canvas.getBoundingClientRect()

const x = e.clientX - rect.left
const y = e.clientY - rect.top

if(tool === "pen"){

ctx.globalCompositeOperation = "source-over"

ctx.strokeStyle = "#000"

ctx.lineWidth = 5

}

if(tool === "eraser"){

ctx.globalCompositeOperation = "destination-out"

ctx.lineWidth = 25

}

ctx.lineCap = "round"

ctx.lineTo(x,y)

ctx.stroke()

ctx.beginPath()

ctx.moveTo(x,y)

}

function setTool(t){

tool = t

penBtn.classList.remove("active")
eraserBtn.classList.remove("active")

if(t === "pen") penBtn.classList.add("active")
if(t === "eraser") eraserBtn.classList.add("active")

}

function saveDrawing(){

localStorage.setItem("unidad1_dibujo", canvas.toDataURL())

locked = true

message.innerHTML = "✅ Dibujo guardado"

}

function enableEdit(){

locked = false

message.innerHTML = "✏️ Puedes seguir editando"

}

</script>

</body>

</html>
